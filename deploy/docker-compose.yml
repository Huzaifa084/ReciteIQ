name: reciteiq

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: reciteiq
      POSTGRES_PASSWORD: reciteiq
      POSTGRES_DB: reciteiq
    ports:
      - "127.0.0.1:19832:5432"   # loopback-only, house convention
    volumes:
      - reciteiq_pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512m
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reciteiq"]
      interval: 10s
      timeout: 5s
      retries: 5

  # backend + web services are added in later phases

volumes:
  reciteiq_pgdata:
