name: reciteiq

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: reciteiq
      POSTGRES_PASSWORD: reciteiq
      POSTGRES_DB: reciteiq
    ports:
      - "127.0.0.1:19832:5432"   # loopback-only, house convention
    volumes:
      - reciteiq_pgdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512m
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reciteiq"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ../backend
    restart: unless-stopped
    environment:
      RECITEIQ_DATABASE_URL: postgresql+psycopg://reciteiq:reciteiq@db:5432/reciteiq
      RECITEIQ_ALLOWED_ORIGINS: '["https://reciteiq.wiserhelpdesk.com"]'
      # ASR engine + secret come from deploy/.env (gitignored). Defaults keep
      # the local engine if .env is absent, so the public compose has no key.
      RECITEIQ_ASR_ENGINE: ${RECITEIQ_ASR_ENGINE:-whisper_local}
      RECITEIQ_GROQ_API_KEY: ${RECITEIQ_GROQ_API_KEY:-}
    volumes:
      - ../backend/models:/app/models:ro
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1536m
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  web:
    build: ../frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:19843:443"    # edge SNI map routes reciteiq.wiserhelpdesk.com here
    volumes:
      - ./nginx/reciteiq.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/nginx-edge/ssl/wiserhelpdesk.com:/etc/nginx/ssl:ro
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128m
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

volumes:
  reciteiq_pgdata:
